services:
  backend:
    build: ./playstation_store
    container_name: playstation_backend
    restart: always
    environment:
      - DB_NAME=sai921_playstation_store_db
      - DB_USER=sai921_root
      - DB_PASSWORD=wE0vU9yC4j
      - DB_HOST=5.252.195.161
      - DB_PORT=3306
    env_file:
      - ./playstation_store/.env
    volumes:
      - ./playstation_store/staticfiles:/app/staticfiles
      - ./playstation_store/static:/app/static
      - ./playstation_store/media:/app/media

  frontend:
    build: ./playstation_frontend
    container_name: playstation_frontend
    restart: always
    # No env_file needed — env vars are baked in at Next.js build time

  nginx:
    image: nginx:latest
    container_name: playstation_nginx
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./playstation_store/staticfiles:/app/static:ro
      - ./playstation_store/media:/app/media
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - frontend
      - backend
