{% extends 'base.html' %}
{% block title %}Login - PlayStation Store{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center">Login</h2>
        <div class="card shadow-sm">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-primary w-100 mt-3">Login</button>
                    <p class="mt-3 text-center">Don't have an account? <a href="{% url 'users:register' %}">Register here</a></p>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
